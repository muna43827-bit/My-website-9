<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCW 786 | Luxury Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #cba35c; /* Luxury Gold */
            --accent: #d4af37;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --card-bg: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            --gold-gradient: linear-gradient(135deg, #cba35c 0%, #edc967 50%, #a47e3c 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background: var(--bg);
            color: white;
            display: flex;
            height: 100vh;
            overflow: hidden;
            /* Background decoration for luxury feel */
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(203, 163, 92, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(203, 163, 92, 0.08) 0%, transparent 40%);
        }

        /* Sidebar Luxury Update */
        .sidebar {
            width: 100px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(25px);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            border-right: 1px solid rgba(203, 163, 92, 0.2);
            z-index: 10;
        }

        .nav-item {
            width: 60px;
            height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            cursor: pointer;
            border-radius: 18px;
            transition: all 0.4s ease;
            color: #666;
            border: 1px solid transparent;
        }

        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item span { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

        .nav-item.active {
            background: var(--card-bg);
            color: var(--primary);
            border: 1px solid rgba(203, 163, 92, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 10px rgba(203, 163, 92, 0.1);
            transform: translateY(-5px);
        }

        /* Content Area */
        .content-area { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px; }

        .tab-content {
            display: none; width: 100%; max-width: 480px;
            background: var(--card-bg); padding: 45px; border-radius: 40px;
            border: 1px solid rgba(203, 163, 92, 0.15);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            position: relative;
        }
        
        .tab-content::after {
            content: ''; position: absolute; top: -1px; left: 10%; right: 10%; height: 1px;
            background: var(--gold-gradient); opacity: 0.5;
        }

        .tab-content.active { display: block; animation: luxFade 0.6s ease-out; }
        @keyframes luxFade { from { opacity: 0; filter: blur(10px); transform: translateY(20px); } to { opacity: 1; filter: blur(0); transform: translateY(0); } }

        /* Luxury Clock & Calendar */
        .smart-clock { 
            font-family: 'Playfair Display', serif; 
            font-size: 72px; 
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px;}
        .cal-grid b { color: var(--primary); font-size: 10px; padding-bottom: 5px; }
        .cal-grid div { font-size: 13px; padding: 8px 0; border-radius: 8px; transition: 0.3s; color: #999; }
        .today { background: var(--gold-gradient) !important; color: black !important; font-weight: 700; box-shadow: 0 5px 15px rgba(203,163,92,0.4); }

        /* Luxury Weather */
        .weather-card {
            background: linear-gradient(135deg, rgba(20,20,20,1) 0%, rgba(40,40,40,1) 100%);
            border-radius: 30px; padding: 30px; border: 1px solid rgba(255,255,255,0.05);
        }
        .temp-val { font-family: 'Playfair Display', serif; font-size: 65px; color: white; }

        /* Luxury Calculator */
        #screen {
            background: #000; border: 1px solid rgba(203, 163, 92, 0.2);
            padding: 25px; border-radius: 20px; font-size: 38px;
            text-align: right; margin-bottom: 25px; color: var(--primary);
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
            font-family: 'Courier New', monospace;
        }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .calc-btn {
            padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.03);
            background: rgba(255,255,255,0.03); color: #eee; cursor: pointer;
            font-size: 18px; transition: all 0.2s;
        }
        .calc-btn:hover { background: rgba(255,255,255,0.08); border-color: var(--primary); }
        .calc-btn.op { color: var(--primary); font-weight: 700; }
        .calc-btn.eq { background: var(--gold-gradient); color: black; font-weight: 800; border: none; }

        /* Feature Cards */
        .feature-card {
            background: rgba(255,255,255,0.02); padding: 20px; border-radius: 20px;
            margin-bottom: 15px; display: flex; align-items: center; gap: 20px;
            text-align: left; border: 1px solid rgba(255,255,255,0.03);
        }
        .feature-card i { font-size: 24px; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        input {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(203, 163, 92, 0.2);
            padding: 15px; border-radius: 12px; color: white; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(203, 163, 92, 0.2); }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div style="margin-bottom: 40px;"><i class="fas fa-crown" style="color: var(--primary); font-size: 28px; filter: drop-shadow(0 0 10px var(--primary));"></i></div>

        <div class="nav-item active" onclick="showTab('homeTab', this)">
            <i class="fas fa-thin fa-compass"></i><span>Status</span>
        </div>
        <div class="nav-item" onclick="showTab('weatherTab', this)">
            <i class="fas fa-wind"></i><span>Climate</span>
        </div>
        <div class="nav-item" onclick="showTab('calcTab', this)">
            <i class="fas fa-vault"></i><span>Finance</span>
        </div>
        <div class="nav-item" onclick="showTab('aboutTab', this)">
            <i class="fas fa-fingerprint"></i><span>Access</span>
        </div>
    </nav>

    <div class="content-area">

        <div id="homeTab" class="tab-content active">
            <h1 class="smart-clock" id="liveTime">00:00</h1>
            <p id="liveDate" style="letter-spacing: 3px; font-weight: 300; color: #666; margin-bottom: 30px; text-transform: uppercase; font-size: 12px;"></p>
            <div class="cal-grid" id="calendarBody"></div>
        </div>

        <div id="weatherTab" class="tab-content">
            <div style="display: flex; gap: 12px; margin-bottom: 30px;">
                <input type="text" id="cityIn" placeholder="Location..." style="flex:1;">
                <button onclick="getWeather()" style="background:var(--gold-gradient); border:none; padding: 0 20px; border-radius:12px; cursor:pointer;"><i class="fas fa-search" style="color:black;"></i></button>
            </div>
            <div class="weather-card">
                <i class="fas fa-sun" style="font-size: 50px; color: var(--primary); margin-bottom: 15px;"></i>
                <h1 class="temp-val" id="tempLabel">24°C</h1>
                <p id="cityLabel" style="color: #666; text-transform: uppercase; letter-spacing: 2px; font-size: 14px;">Baghpat Estate</p>
            </div>
        </div>

        <div id="calcTab" class="tab-content">
            <div id="screen">0</div>
            <div class="calc-grid">
                <button class="calc-btn op" onclick="clr()">AC</button>
                <button class="calc-btn op" onclick="add('/')">÷</button>
                <button class="calc-btn op" onclick="add('*')">×</button>
                <button class="calc-btn op" onclick="add('-')">−</button>
                <button class="calc-btn" onclick="add('7')">7</button>
                <button class="calc-btn" onclick="add('8')">8</button>
                <button class="calc-btn" onclick="add('9')">9</button>
                <button class="calc-btn op" onclick="add('+')">+</button>
                <button class="calc-btn" onclick="add('4')">4</button>
                <button class="calc-btn" onclick="add('5')">5</button>
                <button class="calc-btn" onclick="add('6')">6</button>
                <button class="calc-btn eq" onclick="solve()" style="grid-row: span 2;">=</button>
                <button class="calc-btn" onclick="add('1')">1</button>
                <button class="calc-btn" onclick="add('2')">2</button>
                <button class="calc-btn" onclick="add('3')">3</button>
                <button class="calc-btn" onclick="add('0')" style="grid-column: span 2;">0</button>
                <button class="calc-btn" onclick="add('.')">.</button>
            </div>
        </div>

        <div id="aboutTab" class="tab-content">
            <h2 style="font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 25px; color: var(--primary);">System Information</h2>
            
            <div class="feature-card">
                <i class="fas fa-chess-king"></i>
                <div><b style="color: #fff;">Elite Security</b><p style="font-size: 11px; opacity:0.6; margin-top:4px;">Encrypted connection via CCW-Protocol.</p></div>
            </div>
            
            <div class="feature-card">
                <i class="fas fa-gem"></i>
                <div><b style="color: #fff;">Luxury UI</b><p style="font-size: 11px; opacity:0.6; margin-top:4px;">Golden-ratio typography & design.</p></div>
            </div>
            
            <p style="margin-top: 30px; font-size: 10px; letter-spacing: 2px; color: #444;">CCW BLACK LABEL EDITION v3.0</p>
        </div>

    </div>

    <script>
        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('liveTime').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false});
            document.getElementById('liveDate').innerText = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function initCalendar() {
            const now = new Date();
            const grid = document.getElementById('calendarBody');
            grid.innerHTML = "";
            ['S','M','T','W','T','F','S'].forEach(d => grid.innerHTML += `<b>${d}</b>`);
            let first = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
            for(let i=0; i<first; i++) grid.innerHTML += "<div></div>";
            for(let i=1; i<=31; i++) {
                let d = new Date(now.getFullYear(), now.getMonth(), i);
                if(d.getMonth() !== now.getMonth()) break;
                grid.innerHTML += `<div class="${(i===now.getDate())?'today':''}">${i}</div>`;
            }
        }
        initCalendar();

        let s = document.getElementById('screen');
        function add(v) { if(s.innerText==="0" && v !== '.') s.innerText=v; else s.innerText+=v; }
        function clr() { s.innerText="0"; }
        function solve() { try{ s.innerText = eval(s.innerText); } catch{ s.innerText="Error"; } }

        function getWeather() {
            let c = document.getElementById('cityIn').value || "Baghpat";
            document.getElementById('cityLabel').innerText = c + " Estate";
            document.getElementById('tempLabel').innerText = Math.floor(Math.random()*10+22) + "°C";
        }
    </script>
</body>
</html>
